<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <!-- Logo Icon -->
    <link rel="shortcut icon" href="assets/imgs/Brand/logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="flex flex-col items-center justify-center mx-auto">
        <!-- title -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-800">Checkout</h1>
            <p class="text-gray-500 mt-2">Complete your order details below</p>
        </div>
        <div>
            <!-- Form -->
            <div class="bg-white rounded-2xl shadow-xl p-8 w-full border border-gray-100">
                <h2 class="text-2xl font-bold mb-6">Billing Details</h2>
                <form id="checkoutForm" class="space-y-5">
                    <div>
                        <label class="block mb-2 font-medium text-gray-700">
                            Full Name
                        </label>
                        <input type="text" id="name"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-yellow-400"
                            placeholder="Enter your full name">
                    </div>
                    <div>
                        <label class="block mb-2 font-medium text-gray-700">
                            Email Address
                        </label>
                        <input type="email" id="email"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-yellow-400"
                            placeholder="Enter your email">
                    </div>
                    <div>
                        <label class="block mb-2 font-medium text-gray-700">
                            Phone Number
                        </label>
                        <input type="text" id="phone"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-yellow-400"
                            placeholder="Enter your phone">
                    </div>
                    <div>
                        <label class="block mb-2 font-medium text-gray-700">
                            Address
                        </label>
                        <textarea id="address"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-yellow-400 h-32 resize-none"
                            placeholder="Enter your address"></textarea>
                    </div>
                    <button type="submit"
                        class="w-full py-3 rounded-xl bg-black text-white hover:bg-yellow-400 hover:text-black transition font-semibold">
                        <i class="fa-solid fa-lock mr-2"></i>
                        Place Order
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/checkout.js"></script>
</body>

</html>
