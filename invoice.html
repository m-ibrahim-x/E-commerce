<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <!-- Logo Icon -->
    <link rel="shortcut icon" href="assets/imgs/Brand/logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-5xl mx-auto">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header -->
            <div
                class="bg-[#131921] text-white px-8 py-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold">E-Shop Invoice</h1>
                    <p class="text-gray-300 mt-1">Thank you for your purchase</p>
                </div>
                <div class="text-sm space-y-2 text-left">
                    <p>
                        <span class="text-gray-400">Invoice ID:</span>
                        <span id="invoiceId"></span>
                    </p>
                    <p>
                        <span class="text-gray-400">Date:</span>
                        <span id="invoiceDate"></span>
                    </p>
                    <p class="text-green-400 font-semibold">
                        <i class="fa-solid fa-circle-check mr-1"></i>
                        Paid Successfully
                    </p>
                </div>
            </div>
            <!-- Body -->
            <div class="p-8">
                <!-- Customer -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                    <!-- Billing -->
                    <div>
                        <h2 class="text-xl font-bold mb-4 text-gray-800">
                            Billing Information
                        </h2>
                        <div class="space-y-2 text-gray-600">
                            <p>
                                <strong>Name:</strong>
                                <span id="customerName"></span>
                            </p>
                            <p>
                                <strong>Email:</strong>
                                <span id="customerEmail"></span>
                            </p>
                            <p>
                                <strong>Phone:</strong>
                                <span id="customerPhone"></span>
                            </p>
                            <p>
                                <strong>Address:</strong>
                                <span id="customerAddress"></span>
                            </p>
                        </div>
                    </div>
                </div>
                <!-- Table -->
                <div class="overflow-x-auto rounded-xl border border-gray-200">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 text-gray-700">
                            <tr>
                                <th class="px-5 py-4 font-semibold">Product</th>
                                <th class="px-5 py-4 font-semibold text-center">Qty</th>
                                <th class="px-5 py-4 font-semibold text-center">Price</th>
                                <th class="px-5 py-4 font-semibold text-center">Total</th>
                            </tr>
                        </thead>
                        <tbody id="invoiceProducts" class="text-gray-700 bg-white">
                        </tbody>
                    </table>
                </div>
                <!-- Summary -->
                <div class="mt-10 flex justify-end">
                    <div class="w-full md:w-96 bg-gray-50 rounded-2xl p-6 space-y-4">
                        <div class="flex justify-between text-gray-600">
                            <span>Subtotal</span>
                            <span id="subtotal">0 EGP</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Shipping</span>
                            <span id="shipping">50 EGP</span>
                        </div>
                        <div class="border-t pt-4 flex justify-between text-xl font-bold text-black">
                            <span>Total</span>
                            <span id="total" class="text-yellow-500">0 EGP</span>
                        </div>
                    </div>
                </div>
                <!-- Buttons -->
                <div class="mt-10 flex flex-col sm:flex-row gap-4">
                    <button onclick="window.print()"
                        class="px-6 py-3 rounded-xl bg-black text-white hover:bg-yellow-400 hover:text-black transition">
                        <i class="fa-solid fa-print mr-2"></i>
                        Print Invoice
                    </button>
                    <a href="index.html" class="px-6 py-3 rounded-xl border text-center hover:bg-gray-100 transition">
                        <i class="fa-solid fa-house mr-2"></i>
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/invoice.js"></script>

</body>

</html>
