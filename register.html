<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/css/all.min.css">
</head>

<body class="bg-gray-100">

    <!-- Container -->
    <div class="min-h-screen flex items-center justify-center bg-gradient-to-r from-[#131921] to-[#232f3e] px-4">
        <!-- Card -->
        <div class="w-full max-w-md bg-[#131921] rounded-xl p-8 shadow-2xl text-white">
            <!-- Title -->
            <h2 class="text-center text-2xl font-bold mb-6">Create Account</h2>
            <!-- Form -->
            <form id="registerForm" class="space-y-4">
                <!-- Username -->
                <div>
                    <label class="block text-gray-400 mb-1 text-sm">Username</label>
                    <input id="username" type="text" placeholder="Enter your username"
                        class="w-full px-4 py-2 rounded-md bg-[#0f172a] border border-gray-600 focus:border-[#febd69] focus:ring-1 focus:ring-[#febd69] outline-none transition">
                </div>
                <!-- Email -->
                <div>
                    <label class="block text-gray-400 mb-1 text-sm">Email</label>
                    <input id="email" type="email" placeholder="Enter your email"
                        class="w-full px-4 py-2 rounded-md bg-[#0f172a] border border-gray-600 focus:border-[#febd69] focus:ring-1 focus:ring-[#febd69] outline-none transition">
                </div>
                <!-- Password -->
                <div class="relative">
                    <label class="block text-gray-400 mb-1 text-sm">Password</label>
                    <input id="password" type="password" placeholder="Enter password"
                        class="w-full px-4 py-2 rounded-md bg-[#0f172a] border border-gray-600 focus:border-[#febd69] focus:ring-1 focus:ring-[#febd69] outline-none transition">
                    <!-- Show Password -->
                    <i
                        class="fa-solid fa-eye absolute right-3 top-9 cursor-pointer text-gray-400 hover:text-[#febd69]"></i>
                </div>
                <!-- Confirm Password -->
                <div>
                    <label class="block text-gray-400 mb-1 text-sm">Confirm Password</label>
                    <input id="confirmPassword" type="password" placeholder="Confirm password"
                        class="w-full px-4 py-2 rounded-md bg-[#0f172a] border border-gray-600 focus:border-[#febd69] focus:ring-1 focus:ring-[#febd69] outline-none transition">
                </div>
                <!-- Button -->
                <button type="submit"
                    class="w-full bg-[#febd69] text-black font-semibold py-2 rounded-md hover:bg-[#f3a847] hover:-translate-y-0.5 transition duration-200">
                    Register
                </button>
            </form>
            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-gray-600"></div>
                <span class="text-sm text-gray-400 whitespace-nowrap">
                    Or sign up with
                </span>
                <div class="flex-1 h-px bg-gray-600"></div>
            </div>
            <!-- Social -->
            <div class="flex justify-center gap-3">
                <button class="p-3 bg-gray-800 rounded-md hover:bg-[#febd69] hover:text-black transition"
                    aria-label="Login with Google">
                    <i class="fa-brands fa-google text-lg"></i>
                </button>
                <button class="p-3 bg-gray-800 rounded-md hover:bg-[#febd69] hover:text-black transition"
                    aria-label="Login with Twitter">
                    <i class="fa-brands fa-twitter text-lg"></i>
                </button>
                <button class="p-3 bg-gray-800 rounded-md hover:bg-[#febd69] hover:text-black transition"
                    aria-label="Login with GitHub">
                    <i class="fa-brands fa-github text-lg"></i>
                </button>
            </div>
            <!-- Login -->
            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account?
                <a href="login.html" class="text-[#febd69] hover:underline">Login</a>
            </p>
        </div>
    </div>
    <!-- JS -->
    <script src="assets/js/register.js"></script>

</body>

</html>
