<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce</title>
    <!-- Logo Icon -->
    <link rel="shortcut icon" href="assets/imgs/Brand/logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>


<body class="bg-gray-100">
    <!-- Start Header  -->
    <header class="bg-[#131921] text-white sticky top-0 z-50">
        <!-- TOP -->
        <div class=" mx-auto px-4 py-3 flex items-center gap-4">
            <!-- Logo -->
            <div class="flex items-center">
                <img src="assets/imgs/Brand/logo.png"
                    class="size-10 border border-2 border-gray-300 rounded-full object-cover" alt="Logo">
            </div>
            <!-- Search -->
            <form class="flex flex-1 max-w-2xl mx-auto">
                <div class="flex w-full bg-white rounded overflow-hidden border">
                    <input type="search" placeholder="Search..." class="w-full px-3 py-2 text-black outline-none">
                    <button type="submit" class="bg-[#febd69] px-4 flex items-center justify-center cursor-pointer"
                        aria-label="Search">
                        <i class="fa-solid fa-magnifying-glass text-black"></i>
                    </button>
                </div>
            </form>
            <!-- Icons -->
            <div class="flex items-center gap-5 text-lg">
                <select id="langSelect"
                    class="bg-[#131921] text-white border border-gray-400 px-2 py-1 rounded text-sm focus:outline-none"
                    aria-label="Select Language">
                    <option value="en" class="text-white">EN</option>
                    <option value="ar" class="text-white">AR</option>
                </select>
                <!-- Wishlist -->
                <div class="relative cursor-pointer">
                    <i class="fa-solid fa-heart"></i>
                    <span class="absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded">0</span>
                </div>
                <!-- Cart -->
                <div class="relative cursor-pointer">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="absolute -top-2 -right-2 bg-yellow-400 text-black text-xs px-1 rounded">0</span>
                </div>
            </div>
        </div>
        <!-- BOTTOM -->
        <nav class="bg-[#232f3e]">
            <div class=" mx-auto px-4 py-2 flex  gap-4 justify-between items-center">
                <!-- Links -->
                <ul class="flex gap-4 text-sm md:text-base font-medium gap-6  lg:gap-8">
                    <li><a href="#" class="border-b-2 border-yellow-400 text-yellow-400">Home</a></li>
                    <li><a href="#" class="hover:text-yellow-400">Products</a></li>
                    <li><a href="#" class="hover:text-yellow-400">About</a></li>
                    <li><a href="#" class="hover:text-yellow-400">Contact</a></li>
                </ul>
                <!-- Right -->
                <div class="nav-btns flex items-center gap-4">
                    <button class="btn-register px-4 py-2 border border-gray-400 rounded hover:bg-gray-700 transition"
                        aria-label="Register">
                        <a href="#" class="hover:text-yellow-400">Register</a>
                    </button>
                    <button class="btn-logout px-4 py-2 border border-yellow-400 rounded hover:bg-gray-700 transition"
                        aria-label="Log Out">
                        <a href="#" class="hover:text-yellow-400">Log Out</a>
                    </button>
                    <!-- Sidebar Toggle -->
                    <button onclick="toggleSidebar()" class="p-2 rounded 
                    text-gray-300 
                    hover:text-yellow-400 
                    hover:bg-gray-700 
                    transition duration-200" aria-label="Toggle Sidebar">
                        <i class="fa-solid fa-sliders text-lg"></i>
                    </button>
                </div>
            </div>
        </nav>
    </header>
    <!-- Start Sidebar -->
    <aside id="sidebar"
        class="fixed right-0 top-[122px] h-[calc(100%-122px)] bg-white shadow w-16 transition-all duration-300 flex flex-col z-50">
        <nav class="flex flex-col gap-4 p-3">
            <a href="#" class="flex items-center gap-3 p-2 rounded hover:bg-gray-100 transition">
                <i class="fa-solid fa-cart-shopping w-6 text-center text-lg"></i>
                <span class="sidebar-text hidden">Orders</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-2 rounded hover:bg-gray-100 transition">
                <i class="fa-solid fa-heart w-6 text-center text-lg"></i>
                <span class="sidebar-text hidden">Wishlist</span>
            </a>
            <a href="#" class="flex items-center gap-3 p-2 rounded hover:bg-gray-100 transition">
                <i class="fa-solid fa-file-invoice w-6 text-center text-lg"></i>
                <span class="sidebar-text hidden">Invoice</span>
            </a>
        </nav>
    </aside>
    <!-- Start Hero Section -->
    <main id="mainContent"
        class="bg-gradient-to-r from-[#131921] to-[#232f3e] text-white min-h-[80vh] relative transition-all duration-300 mr-16">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
              w-[80%] text-center">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">
                Discover Comfort <br>
                In Every Detail
            </h1>
            <p class="text-gray-300 mb-6">
                Explore our premium collection of products designed to bring comfort.
            </p>
            <div class="flex gap-4 justify-center">
                <button class="bg-[#febd69] text-black px-6 py-2 rounded hover:scale-105 transition">
                    Shop Now
                </button>
                <button class="border px-6 py-2 rounded hover:bg-white hover:text-black transition">
                    Explore
                </button>
            </div>
        </div>
    </main>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
